trigger:
  branches:
    include:
      - main

pool:
  vmImage: 'ubuntu-latest'

steps:
- task: NodeTool@0
  inputs:
    versionSpec: '16.x'

- script: |
    npm install
    npm run build
    npm test
  displayName: 'Install, Build and Test'

- task: PublishBuildArtifacts@1
  inputs:
    pathToPublish: './dist'
    artifactName: 'build'
