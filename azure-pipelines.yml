trigger:
  branches:
    include:
      - main  # Remplace "main" par la branche appropriée

pool:
  vmImage: 'ubuntu-latest'  # Utilise une image Ubuntu

variables:
  nodeVersion: '16.x'
  sonarCloudToken: '$(SONAR_TOKEN)'  # Utilisation du token SonarCloud comme variable secrète

steps:
- task: UseNode@1  # Utilise la version 1 de UseNode si la version 2 est problématique
  inputs:
    versionSpec: $(nodeVersion)
  displayName: 'Set up Node.js'

- task: SonarCloudPrepare@1
  inputs:
    SonarCloud: 'SonarCloudConnection'  # Nom de ta connexion de service SonarCloud
    organization: 'manelsidaoui'  # Nom de votre organisation SonarCloud
    scannerMode: 'CLI'
    projectKey: 'YourProjectKey'  # Remplacez par la clé de votre projet SonarCloud
    projectName: 'YourProjectName'  # Remplacez par le nom de votre projet SonarCloud
    extraProperties: |
      sonar.login=$(sonarCloudToken)  # Utilisation du token sécurisé directement
  displayName: 'Prepare SonarCloud'

- script: |
    npm install   # Installer les dépendances Node.js
    npm run build # Construire le projet
    npm test      # Exécuter les tests unitaires
  displayName: 'Install, Build and Test'

- task: SonarCloudAnalyze@1
  displayName: 'Run SonarCloud Analysis'

- task: SonarCloudPublish@1
  inputs:
    pollingTimeoutSec: '300'
  displayName: 'Publish SonarCloud Analysis Results'

- task: PublishBuildArtifacts@1
  inputs:
    pathToPublish: './dist'
    artifactName: 'build'
  displayName: 'Publish Artifacts'
